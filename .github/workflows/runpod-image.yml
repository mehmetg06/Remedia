name: Build RunPod image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "runpod/**"
      - "notebooks/remedia_runpod.ipynb"
      - "src/**"
      - ".github/workflows/runpod-image.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: runpod-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/remedia-runpod
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Remedia RunPod Jupyter image with GNINA and fpocket

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            REMEDIA_COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
