name: Attach MolMIM secret

on:
  push:
    paths:
      - '.github/workflows/attach_molmim_secret.yml'

permissions:
  contents: write

jobs:
  patch:
    if: "!contains(github.event.head_commit.message, '[molmim-secret-done]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attach Modal secret to run_job
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('modal/remedia_web_v2.py')
          text = path.read_text(encoding='utf-8')
          old = '''@app.function(
              image=image,
              gpu="L4",
              cpu=8.0,
              volumes={str(VOLUME_PATH): volume},
              timeout=4 * 60 * 60,
              max_containers=1,
          )'''
          new = '''@app.function(
              image=image,
              gpu="L4",
              cpu=8.0,
              volumes={str(VOLUME_PATH): volume},
              secrets=[modal.Secret.from_name("molmim")],
              timeout=4 * 60 * 60,
              max_containers=1,
          )'''
          if old not in text:
              raise SystemExit('run_job decorator block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit change
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add modal/remedia_web_v2.py
          git commit -m 'Attach MolMIM Modal secret to run_job [molmim-secret-done]'
          git push
